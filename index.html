<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro Negro</title>
</head>
<body>
    
<!-- Tag form (formulário) -->
 <!-- action (caso tivesse usando java script) -->

<form action="">

    <!-- nome proprio -->
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required>
    
    <br>

    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" required>
    
    <br>

    <label for="telefone">Telefone</label>
    <input type="tel" name="telefone" id="telefone">
    
    <br>

    <label for="assunto">Assunto: </label>
    <select name="assunto" id="assunto">
        <option value="orcamento">Orçamento</option>
        <option value="duvida">Dúvida</option>
        <option value="outro">Outro</option>
    </select><br>

    <label for="mensagem">Mensagem</label>
    <textarea name="mensagem" id="mensagem" cols="20" rows="5"></textarea required>
    
    <br>

    <input type="checkbox" id="inscricao" name="inscricao">
    <label for="inscricao">Deseja receber informações?</label>

    <br>

    <input type="submit" value="Enviar mensagem">

    <br>

    <input type="button">
    <br>
    <input type="checkbox">
    <br>
    <input type="color">
    <br>
    <input type="date">
    <br>
    <input type="datetime-local">
    <br>
    <input type="email">
    <br>
    <input type="file">
    <br>
    <input type="hidden">
    <br>
    <input type="image">
    <br>
    <input type="month">
    <br>
    <input type="number">
    <br>
    <input type="password">
    br
    <input type="radio">
    <input type="range">
    <input type="reset">
    <input type="search">
    <input type="submit">
    <input type="tel">
    <input type="text">
    <input type="time">
    <input type="url">
    <input type="week">

</form>

</body>
</html>
