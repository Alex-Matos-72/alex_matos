<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro Negro</title>
</head>

<body>

        <section id="habilidades">

        <h2>Habilidade e Tecnologias</h2>

        <table>

            <thead>

                <th>Tecnologias</th>
                <th>Nível</th>
                <th>Descrição</th>

            </thead>

            <tbody>

                <tr>

                    <td>HTML</td>
                    <td>Iniciante</td>
                    <td>Capaz de Construir Estruturas de Paginas Semanticas</td>

                </tr>

            </tbody>

        </table>

    </section>

    <!-- Tag form (formulário) -->
    <!-- action (caso tivesse usando java script) -->

    <form action="">

        <!-- nome proprio -->
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>

        <br>

        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" required>

        <br>

        <label for="telefone">Telefone</label>
        <input type="tel" name="telefone" id="telefone">

        <br>

        <label for="assunto">Assunto: </label>
        <select name="assunto" id="assunto">
            <option value="orcamento">Orçamento</option>
            <option value="duvida">Dúvida</option>
            <option value="outro">Outro</option>
        </select><br>

        <label for="mensagem">Mensagem</label>
        <textarea name="mensagem" id="mensagem" cols="20" rows="5"></textarea required>
    
    <br>

    <input type="checkbox" id="inscricao" name="inscricao">
    <label for="inscricao">Deseja receber informações?</label>

    <br>

    <input type="submit" value="Enviar mensagem">

</form>

</body>
</html>
